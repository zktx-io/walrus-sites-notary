name: Deploy My Static Site to Walrus with Provenance

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af68 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Validate release tag and release notes
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          set -euo pipefail

          TAG_NO_V="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ ! "$TAG_NO_V" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag '$RELEASE_TAG' is not semver-compatible."
            exit 1
          fi

          if [[ "$TAG_NO_V" != "$PACKAGE_VERSION" ]]; then
            echo "Release tag '$RELEASE_TAG' must match package.json version '$PACKAGE_VERSION'."
            exit 1
          fi

          if [[ -z "${RELEASE_BODY//[[:space:]]/}" ]]; then
            echo "Release notes must not be empty."
            exit 1
          fi

          if ! grep -Eiq 'security|vulnerability|cve|none' <<< "$RELEASE_BODY"; then
            echo "Release notes must include a security section or explicit 'none' statement."
            exit 1
          fi

  release-assets:
    needs:
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      RELEASE_SHA: ${{ github.sha }}
      RELEASE_WORKFLOW: .github/workflows/deploy.yml
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af68 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Enforce release dependency threshold
        run: npm audit --omit=dev --audit-level=high

      - name: Build release assets
        run: npm run build

      - name: Generate versioned release assets
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          ASSET_PREFIX="walrus-sites-notary-v${VERSION}"

          mkdir -p release-assets

          tar -czf "release-assets/${ASSET_PREFIX}-dist.tar.gz" dist
          npm sbom --sbom-format spdx --omit=dev > "release-assets/${ASSET_PREFIX}-sbom.spdx.json"

          cat > "release-assets/${ASSET_PREFIX}-manifest.json" <<EOF
          {
            "project": "walrus-sites-notary",
            "release_tag": "${RELEASE_TAG}",
            "version": "${VERSION}",
            "commit": "${RELEASE_SHA}",
            "workflow": "${RELEASE_WORKFLOW}",
            "assets": [
              "${ASSET_PREFIX}-dist.tar.gz",
              "${ASSET_PREFIX}-sbom.spdx.json"
            ]
          }
          EOF

          (
            cd release-assets
            shasum -a 256 \
              "${ASSET_PREFIX}-dist.tar.gz" \
              "${ASSET_PREFIX}-sbom.spdx.json" \
              "${ASSET_PREFIX}-manifest.json" \
              > "${ASSET_PREFIX}-checksums.txt"
          )

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" release-assets/* --clobber

  deploy-with-provenance:
    needs:
      - validate-release
      - release-assets
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: zktx-io/walrus-sites-provenance/.github/workflows/deploy_with_slsa3.yml@a3fbd9ac728f6ce3ed094db290e2bddacbac0ac6 # v0.5.8
    secrets:
      GIT_SIGNER_PIN: ${{ secrets.GIT_SIGNER_PIN }}
      ED25519_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
