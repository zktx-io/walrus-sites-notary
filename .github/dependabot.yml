version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 4
    commit-message:
      prefix: deps
    groups:
      runtime-dependencies:
        patterns:
          - react
          - react-dom
          - react-router-dom
          - react-markdown
          - react-syntax-highlighter
          - rehype-raw
          - remark-gfm
          - lucide-react
          - canvas-confetti
          - "@tanstack/*"
          - "@mysten/*"
          - "@noble/*"
          - "@zktx.io/*"
      tooling-and-types:
        patterns:
          - typescript
          - vite
          - vitest
          - eslint
          - eslint-*
          - globals
          - jsdom
          - tailwindcss
          - "@types/*"
          - "@vitejs/*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "@tailwindcss/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
